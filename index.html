<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Recette du Koulibiac au saumon">
    <title>Recette : Koulibiac au saumon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .b-example-divider {
            height: 3rem;
            background-color: rgba(0, 0, 0, .1);
            border: solid rgba(0, 0, 0, .15);
            border-width: 1px 0;
            box-shadow: inset 0 .5em 1.5em rgba(0, 0, 0, .1), inset 0 .125em .5em rgba(0, 0, 0, .15);
        }
        .list-group {
            max-width: 800px;
            margin: 4rem auto;
        }
        .marketing .col-lg-4 {
            margin-bottom: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    
<main>
    <div class="px-4 py-5 my-5 text-center">
        <img class="d-block mx-auto mb-4 img-fluid rounded shadow-sm" src="https://via.placeholder.com/800x400?text=Koulibiac+au+Saumon" alt="Un magnifique Koulibiac au saumon" style="max-width:60%">
        
        <h1 class="display-5 fw-bold">Koulibiac au saumon</h1>
        
        <div class="col-lg-6 mx-auto">
            <p class="lead mb-4">Le grand classique au saumon, riz, champignons, épinards et œufs durs.</p>
            
            <div class="d-flex justify-content-center gap-3 mb-4">
                <span class="badge rounded-pill text-bg-light border fs-6 px-3 py-2">⏳ Préparation : 1 h | Cuisson : 20 min</span>
                <span class="badge rounded-pill text-bg-warning fs-6 px-3 py-2">📊 Difficulté : Moyen</span>
            </div>
        </div>
    </div>

    <div class="b-example-divider"></div>

    <div class="px-4 pt-5 my-5 text-center border-bottom container marketing">
        <h2 class="display-4 fw-bold mb-5">Ingrédients :</h2>
        
        <div class="row" id="productList">
            <p class="text-muted fst-italic">
                (Chargement dynamique des ingrédients et de leurs Nutri-Scores via l'API OpenFoodFacts...)
            </p>
        </div>
    </div>

    <div class="b-example-divider"></div>

    <div class="container my-5">
        <h2 class="display-4 fw-bold text-center mb-5">Préparation :</h2>
        
        <div class="list-group w-auto">
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 1</h6>
                        <p class="mb-0 opacity-75">Faites pocher le saumon 10 minutes dans le court-bouillon et le vin blanc chauds. Egouttez-le.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 2</h6>
                        <p class="mb-0 opacity-75">Faites cuire le riz dans le court-bouillon de cuisson du saumon environ 20 min, et les épinards à l'eau bouillante salée 20 min également.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 3</h6>
                        <p class="mb-0 opacity-75">Faites revenir les échalotes et les champignons hachés dans le beurre chaud. Salez, poivrez et assaisonnez d'un filet de jus de citron. Laissez refroidir.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 4</h6>
                        <p class="mb-0 opacity-75">Egouttez bien le riz et les épinards. Emiettez le saumon. Ecalez et écrasez les oeufs durs.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 5</h6>
                        <p class="mb-0 opacity-75">Hachez l'aneth et la ciboulette.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 6</h6>
                        <p class="mb-0 opacity-75">Etalez les 2/3 de la pâte en un rectangle assez épais. Etalez dessus le riz, puis le saumon émietté, l'aneth, les champignons aux échalotes, la ciboulette et enfin les oeufs durs. Prenez soin de laisser 2 cm de pâte de chaque côté.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 7</h6>
                        <p class="mb-0 opacity-75">Remontez les bords, puis couvrez avec la pâte restante étalée en un rectangle également. Soudez les bords en pinçant ou en faisant une sorte d'ourlet.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 8</h6>
                        <p class="mb-0 opacity-75">Décorez le dessus en striant au couteau. Badigeonnez de jaune d'oeuf délayé dans du lait.</p>
                    </div>
                </div>
            </label>
            
            <label class="list-group-item list-group-item-action d-flex gap-3 py-3">
                <div class="d-flex gap-2 w-100 justify-content-between">
                    <div>
                        <h6 class="mb-0 fw-bold">Étape 9</h6>
                        <p class="mb-0 opacity-75">Faites cuire le koulibiac 20 min au four à 210°C (thermostat 7). Servez chaud ou tiède, avec un coulis de tomates.</p>
                    </div>
                </div>
            </label>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
